          city: 'Самара', place: 'Самара', desc: 'Экспорт цифровых продуктов', status: 'active' },
        { id: 'e31', title: 'Форум «Люди. Бизнес. Деньги»', date: '2026-11-26', time: '10:00',
          city: 'Уфа', place: 'Геномный центр', desc: 'Налоги, инвесторы', status: 'active' },
        { id: 'e32', title: 'Форум малого бизнеса стран ШОС и БРИКС', date: '2026-09-15', time: '10:00',
          city: 'Уфа', place: 'Уфа', desc: 'Международное предпринимательство', status: 'active' },
        { id: 'e33', title: 'Восточный экономический форум (ВЭФ-2026)', date: '2026-09-01', time: '10:00',
          city: 'Владивосток', place: 'ДВФУ', desc: 'Технологии Дальнего Востока', status: 'active' },
        { id: 'e34', title: 'Восточный цифровой форум', date: '2026-10-02', time: '09:00',
          city: 'Владивосток', place: 'Владивосток', desc: 'Цифровизация', status: 'active' }
      ];

      data.likes = {};
      data.eventRegs = {};
      data.chats = [];
      data.selectedCity = 'Москва';
      saveData();
    } else {
      data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    }
  }

  function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

  function getCurrentUser() {
    return data.users.find(u => u.email === data.currentUser);
  }

  // ----- НАВИГАЦИЯ -----
  let currentPage = 'login';
  function navigate(page) {
    currentPage = page;
    renderMenu();
    renderPage();
    closeMenu();
  }

  function renderMenu() {
    const menu = document.getElementById('sideMenu');
    const user = getCurrentUser();
    let items = [
      { label: '🏠 Главный экран', page: 'main' },
      { label: '🧑‍🤝‍🧑 Метч (люди)', page: 'match-people' },
      { label: '🎪 Метч (мероприятия)', page: 'match-events' },
      { label: '📅 Календарь', page: 'calendar' },
      { label: '💬 Мои чаты', page: 'chats' },
      { label: '✍️ Создать мероприятие', page: 'create-event' },
      { label: '👤 Профиль', page: 'profile' },
    ];
    if (user && user.role === 'admin') {
      items.push({ label: '🛡️ Модерация', page: 'moderation' });
    }
    items.push({ label: '🚪 Выйти', page: 'logout' });
    menu.innerHTML = items.map(i =>
      `<div class="menu-item" onclick="navigate('${i.page}')">${i.label}</div>`
    ).join('');
  }

  function renderPage() {
    const container = document.getElementById('mainContent');
    container.innerHTML = '';
    const pageDiv = document.createElement('div');
    pageDiv.className = 'page active';
    if (currentPage === 'login') renderLogin(pageDiv);
    else if (currentPage === 'register') renderRegister(pageDiv);
    else if (currentPage === 'main') renderMain(pageDiv);
    else if (currentPage === 'match-people') renderMatchPeople(pageDiv);
    else if (currentPage === 'match-events') renderMatchEvents(pageDiv);
    else if (currentPage === 'calendar') renderCalendar(pageDiv);
    else if (currentPage === 'chats') renderChats(pageDiv);
    else if (currentPage === 'create-event') renderCreateEvent(pageDiv);
    else if (currentPage === 'profile') renderProfile(pageDiv);
    else if (currentPage === 'moderation') renderModeration(pageDiv);
    else if (currentPage === 'logout') {
      data.currentUser = null;
      saveData();
      navigate('login');
      return;
    }
    container.appendChild(pageDiv);
  }

  function closeMenu() {
    document.getElementById('sideMenu').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
  }
  function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }

  // Городской селектор (повторно используемый)
  function citySelectorHTML(selectedCity) {
    const options = CITIES.map(c => `<option value="${c}" ${c===selectedCity?'selected':''}>${c}</option>`).join('');
    return `<div class="city-selector">
      <select onchange="changeCity(this.value)">
        ${options}
      </select>
    </div>`;
  }

  // Глобальная смена города
  window.changeCity = function(newCity) {
    data.selectedCity = newCity;
    saveData();
    // Перерисовать текущую страницу, чтобы обновился контент
    navigate(currentPage);
  };

  // ----- СТРАНИЦЫ -----
  function renderLogin(container) {
    container.innerHTML = `
      <h3 style="color:var(--green); text-align:center;">Вход в Коллаборацию</h3>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPass" placeholder="Пароль">
      <button onclick="login()">Войти</button>
      <div style="display:flex; gap:8px;">
        <button class="green" style="flex:1;" onclick="alert('Вход через ВК (демо)')">ВК</button>
        <button class="green" style="flex:1;" onclick="alert('Вход через Leader ID (демо)')">Leader ID</button>
      </div>
      <p style="text-align:center; cursor:pointer; color:var(--green);" onclick="navigate('register')">
        Зарегистрироваться
      </p>
    `;
  }

  function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const user = data.users.find(u => u.email === email && u.password === pass);
    if (user) {
      data.currentUser = email;
      // При входе город для фильтра берём из профиля пользователя (если есть), иначе Москва
      data.selectedCity = user.city || 'Москва';
      saveData();
      navigate('main');
    } else {
      alert('Неверный логин или пароль');
    }
  }

  function renderRegister(container) {
    container.innerHTML = `
      <h3 style="color:var(--green);">Регистрация</h3>
      <input id="regName" placeholder="ФИО">
      <input id="regBdate" type="date">
      <select id="regCity">
        <option value="">Выберите город</option>
        ${CITIES.map(c => `<option value="${c}">${c}</option>`).join('')}
      </select>
      <input id="regRegion" placeholder="Область">
      <input id="regWork" placeholder="Место учёбы/работы">
      <input id="regSkills" placeholder="Навыки (через запятую)">
      <input id="regInterests" placeholder="Интересы (через запятую)">
      <input id="regPhoto" placeholder="Ссылка на фото (или эмодзи)">
      <input id="regEmail" type="email" placeholder="Email">
      <input id="regPass" type="password" placeholder="Пароль">
      <label><input type="checkbox" id="regConsent"> Согласие на обработку ПД</label>
      <button onclick="register()">Зарегистрироваться</button>
    `;
  }

  function register() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    const consent = document.getElementById('regConsent').checked;
    if (!name || !email || !pass || !consent) {
      alert('Заполните все поля и дайте согласие'); return;
    }
    if (data.users.find(u => u.email === email)) {
      alert('Пользователь с таким email уже существует'); return;
    }
    const newUser = {
      email, password: pass, name,
      bdate: document.getElementById('regBdate').value,
      city: document.getElementById('regCity').value,
      region: document.getElementById('regRegion').value.trim(),
      work: document.getElementById('regWork').value.trim(),
      skills: document.getElementById('regSkills').value.split(',').map(s=>s.trim()).filter(Boolean),
      interests: document.getElementById('regInterests').value.split(',').map(s=>s.trim()).filter(Boolean),
      photo: document.getElementById('regPhoto').value.trim() || '👤',
      role: 'user'
    };
    data.users.push(newUser);
    data.currentUser = email;
    data.selectedCity = newUser.city || 'Москва';
    saveData();
    alert('Регистрация успешна!');
    navigate('main');
  }

  function renderMain(container) {
    const activeEvents = data.events.filter(e => e.status === 'active' && e.city === data.selectedCity);
    container.innerHTML = `
      <h3 style="color:var(--green);">Мероприятия</h3>
      ${citySelectorHTML(data.selectedCity)}
      ${activeEvents.map(e => `
        <div class="card" onclick="alert('${e.title}\\n${e.date} ${e.time}\\n${e.place}\\n${e.desc}')">
          <div class="card-title">${e.title}</div>
          <div class="card-detail">📅 ${e.date} · ⏰ ${e.time}</div>
          <div class="card-detail">📍 ${e.place}</div>
          <div class="card-detail" style="color:#666;">${e.desc}</div>
        </div>
      `).join('') || '<p>Нет мероприятий в выбранном городе.</p>'}
    `;
  }

  function renderMatchPeople(container) {
    const peopleInCity = data.people.filter(p => p.city === data.selectedCity);
    if (peopleInCity.length === 0) {
      container.innerHTML = `<h3 style="color:var(--green);">Найди команду</h3>${citySelectorHTML(data.selectedCity)}<p>Нет анкет в этом городе.</p>`;
      return;
    }
    const seen = data.likes[data.currentUser] || [];
    const unseen = peopleInCity.filter(p => !seen.includes(p.id));
    const currentPerson = unseen.length > 0 ? unseen[0] : peopleInCity[0];
    container.innerHTML = `
      <h3 style="color:var(--green); text-align:center;">Найди команду</h3>
      ${citySelectorHTML(data.selectedCity)}
      <div class="match-card">
        <div class="match-photo">${currentPerson.photo || '👤'}</div>
        <h2>${currentPerson.name}</h2>
        <p>${currentPerson.work}</p>
        <div class="tags">
          ${currentPerson.skills.map(s => `<span class="tag tag-green">${s}</span>`).join('')}
          ${currentPerson.interests.map(i => `<span class="tag tag-orange">${i}</span>`).join('')}
        </div>
        <div class="match-actions">
          <div class="action-btn btn-dislike" onclick="swipePerson('${currentPerson.id}','left')">✕</div>
          <div class="action-btn btn-like" onclick="swipePerson('${currentPerson.id}','right')">♥</div>
        </div>
      </div>
    `;
  }

  window.swipePerson = function(personId, direction) {
    const userId = data.currentUser;
    if (!data.likes[userId]) data.likes[userId] = [];
    data.likes[userId].push(personId);
    if (direction === 'right') {
      const otherLikes = data.likes[personId] || [];
      if (otherLikes.includes(userId)) {
        alert('Это Метч! Вы добавлены в чат.');
        const chatExists = data.chats.find(c => c.type === 'personal' &&
          c.participants.includes(userId) && c.participants.includes(personId));
        if (!chatExists) {
          data.chats.push({
            id: 'chat_' + Date.now(),
            type: 'personal',
            participants: [userId, personId],
            messages: []
          });
        }
      } else {
        alert('Вы проявили интерес. Ждите взаимности.');
      }
    }
    saveData();
    navigate('match-people');
  };

  function renderMatchEvents(container) {
    const eventsInCity = data.events.filter(e => e.status === 'active' && e.city === data.selectedCity);
    if (eventsInCity.length === 0) {
      container.innerHTML = `<h3 style="color:var(--green);">Куда пойти?</h3>${citySelectorHTML(data.selectedCity)}<p>Нет мероприятий в этом городе.</p>`;
      return;
    }
    const currentEvent = eventsInCity[Math.floor(Math.random() * eventsInCity.length)];
    container.innerHTML = `
      <h3 style="color:var(--green); text-align:center;">Куда пойти?</h3>
      ${citySelectorHTML(data.selectedCity)}
      <div class="match-card">
        <div class="match-photo" style="background:linear-gradient(135deg, #FF9800, #FF5722);">🎪</div>
        <h2>${currentEvent.title}</h2>
        <p>${currentEvent.date} · ${currentEvent.time}</p>
        <p>📍 ${currentEvent.place}</p>
        <p>${currentEvent.desc}</p>
        <div class="match-actions">
          <div class="action-btn btn-dislike" onclick="swipeEvent('${currentEvent.id}','left')">✕</div>
          <div class="action-btn btn-like" onclick="swipeEvent('${currentEvent.id}','right')">♥</div>
        </div>
      </div>
    `;
  }

  window.swipeEvent = function(eventId, direction) {
    const userId = data.currentUser;
    if (direction === 'right') {
      if (!data.eventRegs[userId]) data.eventRegs[userId] = [];
      if (!data.eventRegs[userId].includes(eventId)) {
        data.eventRegs[userId].push(eventId);
        const event = data.events.find(e => e.id === eventId);
        let chat = data.chats.find(c => c.type === 'group' && c.eventId === eventId);
        if (!chat) {
          chat = {
            id: 'group_' + eventId,
            type: 'group',
            eventId: eventId,
            eventTitle: event.title,
            participants: [userId],
            messages: []
          };
          data.chats.push(chat);
        } else if (!chat.participants.includes(userId)) {
          chat.participants.push(userId);
        }
        alert('Вы записаны на мероприятие и добавлены в чат участников!');
      }
    }
    saveData();
    navigate('match-events');
  };

  function renderCalendar(container) {
    const userId = data.currentUser;
    const userEvents = (data.eventRegs[userId] || []).map(eid => data.events.find(e => e.id === eid)?.date).filter(Boolean);
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    let html = `<h3 style="color:var(--green);">${now.toLocaleString('ru', {month:'long'})} ${year}</h3>`;
    html += '<div class="calendar-grid">';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isEvent = userEvents.includes(dateStr);
      html += `<div class="cal-day ${isEvent ? 'event' : ''}">${d}</div>`;
    }
    html += '</div>';
    container.innerHTML = html;
  }

  function renderChats(container) {
    const userId = data.currentUser;
    const userChats = data.chats.filter(c => c.participants.includes(userId));
    container.innerHTML = `
      <h3 style="color:var(--green);">Мои чаты</h3>
      ${userChats.map(c => {
        if (c.type === 'personal') {
          const other = c.participants.find(p => p !== userId);
          const otherUser = data.users.find(u => u.email === other) || { name: other };
          return `<div class="card" onclick="alert('Открыт чат с ${otherUser.name}')">👤 ${otherUser.name}</div>`;
        } else {
          return `<div class="card" onclick="alert('Групповой чат: ${c.eventTitle}')">👥 ${c.eventTitle}</div>`;
        }
      }).join('') || '<p>У вас пока нет чатов.</p>'}
    `;
  }

  function renderCreateEvent(container) {
    container.innerHTML = `
      <h3 style="color:var(--green);">Новое мероприятие</h3>
      <input id="evTitle" placeholder="Название">
      <textarea id="evDesc" placeholder="Описание"></textarea>
      <input id="evDate" type="date">
      <input id="evTime" type="time">
      <select id="evCity">
        <option value="">Выберите город</option>
        ${CITIES.map(c => `<option value="${c}">${c}</option>`).join('')}
      </select>
      <input id="evPlace" placeholder="Адрес">
      <button onclick="createEvent()">Отправить на модерацию</button>
    `;
  }

  window.createEvent = function() {
    const title = document.getElementById('evTitle').value.trim();
    const desc = document.getElementById('evDesc').value.trim();
    const city = document.getElementById('evCity').value;
    if (!title || !city) { alert('Заполните название и выберите город'); return; }
    data.events.push({
      id: 'ev_' + Date.now(),
      title, desc,
      date: document.getElementById('evDate').value,
      time: document.getElementById('evTime').value,
      city,
      place: document.getElementById('evPlace').value.trim(),
      status: 'pending',
      author: data.currentUser
    });
    saveData();
    alert('Мероприятие отправлено на модерацию!');
    navigate('main');
  };

  function renderProfile(container) {
    const user = getCurrentUser();
    if (!user) { navigate('login'); return; }
    container.innerHTML = `
      <h3 style="color:var(--green);">Профиль</h3>
      <p>Имя: ${user.name}</p>
      <label>Город (ваш город проживания):</label>
      <select id="profCity">
        ${CITIES.map(c => `<option value="${c}" ${user.city===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <label>Область:</label>
      <input id="profRegion" value="${user.region || ''}">
      <button onclick="saveProfile()">Сохранить</button>
      <p style="font-size:0.8rem; color:#666; margin-top:12px;">
        Ваш город профиля используется по умолчанию при входе. Для просмотра других городов используйте фильтр на главной.
      </p>
    `;
  }

  window.saveProfile = function() {
    const user = getCurrentUser();
    user.city = document.getElementById('profCity').value;
    user.region = document.getElementById('profRegion').value.trim();
    const idx = data.users.findIndex(u => u.email === user.email);
    if (idx !== -1) data.users[idx] = user;
    saveData();
    alert('Профиль обновлён!');
    navigate('main');
  };

  function renderModeration(container) {
    const pending = data.events.filter(e => e.status === 'pending');
    container.innerHTML = `
      <h3 style="color:var(--green);">Модерация</h3>
      ${pending.map(e => `
        <div class="card">
          <strong>${e.title}</strong> (${e.city})<br>
          <small>${e.desc}</small>
          <div style="margin-top:8px;">
            <button class="green" onclick="moderate('${e.id}','approve')">Одобрить</button>
            <button onclick="moderate('${e.id}','reject')">Отклонить</button>
          </div>
        </div>
      `).join('') || '<p>Нет мероприятий на модерации.</p>'}
    `;
  }

  window.moderate = function(eventId, action) {
    const event = data.events.find(e => e.id === eventId);
    if (event) {
      event.status = action === 'approve' ? 'active' : 'rejected';
      saveData();
      alert(`Мероприятие ${action === 'approve' ? 'одобрено' : 'отклонено'}`);
      navigate('moderation');
    }
  };

  // Инициализация
  initDemoData();
  if (data.currentUser) {
    // При обновлении страницы город из selectedCity, если он сохранён
    navigate('main');
  } else {
    navigate('login');
  }
</script>

</body></html>
